<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronto Entrega Tech</title>
    <style>
        /* --- ESTILO GERAL --- */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* --- CARD PRINCIPAL --- */
        .product-card {
            background: #ffffff;
            width: 380px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
        }

        /* --- TOPO COM TIMER --- */
        .timer-header {
            background-color: #000000;
            color: #ffffff;
            padding: 12px;
            font-weight: bold;
            font-size: 16px;
        }

        .timer-header span {
            color: #ffff00; /* Amarelo igual da foto */
        }

        /* --- CONTEÚDO DO PRODUTO --- */
        .content {
            padding: 30px 20px;
        }

        .product-title {
            font-size: 24px;
            font-weight: 800;
            color: #1a1a1a;
            margin: 0 0 10px 0;
        }

        .product-description {
            color: #7a7a7a;
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .product-price {
            font-size: 32px;
            font-weight: 900;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        /* --- BOX DE ESTOQUE (IGUAL A FOTO) --- */
        #stock-container {
            border: 1px dashed #ff4d4d;
            background-color: #fff5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 0 10px 20px 10px;
        }

        #stock-container p {
            color: #d32f2f;
            font-weight: bold;
            font-size: 13px;
            margin: 0 0 10px 0;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 10px;
            width: 100%;
            overflow: hidden;
        }

        .progress-fill {
            background: #f56565;
            width: 15%; /* Barra curta para urgência */
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease-in-out;
        }

        /* --- BOTÃO DE AÇÃO --- */
        .btn-buy {
            display: block;
            background-color: #2ecc71; /* Verde da foto */
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .btn-buy:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="product-card">
        <!-- HEADER COM TIMER -->
        <div class="timer-header">
            ⏱ A oferta encerra em: <span id="timer">05:00</span>
        </div>

        <div class="content">
            <!-- INFO PRODUTO -->
            <h1 class="product-title">Smartwatch Serie 9 Pro</h1>
            <p class="product-description">
                Edição Limitada - Tecnologia de Ponta no seu pulso.
            </p>
            
            <div class="product-price">R$ 197,00</div>

            <!-- SEÇÃO DE ESTOQUE -->
            <div id="stock-container">
                <p>🔥 Restam apenas <span id="stock-count">8</span> unidades em estoque!</p>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>

            <!-- BOTÃO -->
            <a href="#" class="btn-buy">GARANTIR O MEU AGORA!</a>
        </div>
    </div>

    <script>
        // --- LOGICA DO TIMER (5 MINUTOS) ---
        let duration = 300; // 5 minutos em segundos
        const display = document.querySelector('#timer');

        function startTimer() {
            let timer = duration, minutes, seconds;
            setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (--timer < 0) {
                    timer = 0;
                }
            }, 1000);
        }

        // --- LOGICA DO ESTOQUE ---
        function updateStock() {
            const stockElement = document.getElementById('stock-count');
            let currentStock = parseInt(stockElement.innerText);

            if (currentStock > 3) {
                stockElement.innerText = currentStock - 1;
            }
        }

        // Inicia as funções
        window.onload = function () {
            startTimer();
            // Diminui o estoque a cada 45 segundos
            setInterval(updateStock, 45000);
        };
    </script>

</body>
</html>
