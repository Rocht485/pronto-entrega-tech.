<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronto Entrega Tech - Oferta Especial</title>
    <style>
        /* --- ESTILOS GERAIS --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f7;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .product-card {
            background: #fff;
            max-width: 400px;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            padding-bottom: 20px;
        }

        .product-info {
            padding: 20px;
            text-align: center;
        }

        /* --- ESTILO DO TIMER --- */
        #timer-container {
            background: #000;
            color: #fff;
            padding: 10px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .highlight-timer {
            color: #ffde00;
        }

        /* --- ESTILO DO ESTOQUE (O QUE VOCÊ ADICIONOU) --- */
        #stock-container {
            background-color: #fff5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin: 15px;
            border: 1px dashed #e53e3e;
        }

        #stock-container p {
            color: #c53030;
            font-weight: bold;
            margin: 0 0 10px 0;
            font-size: 14px;
        }

        .progress-bar {
            background-color: #edf2f7;
            border-radius: 10px;
            height: 10px;
            width: 100%;
            overflow: hidden;
        }

        .progress-fill {
            background-color: #e53e3e;
            height: 100%;
            width: 15%; /* Simula que restam poucos */
            transition: width 1s ease-in-out;
            /* Animação de pulso suave */
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* --- BOTÃO DE COMPRA --- */
        .btn-buy {
            display: block;
            background-color: #25d366; /* Verde WhatsApp ou use #e53e3e para urgência */
            color: white;
            text-decoration: none;
            padding: 15px;
            margin: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.2s;
        }

        .btn-buy:hover {
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <div class="product-card">
        <div id="timer-container" style="text-align: center;">
            ⏱ A oferta encerra em: <span class="highlight-timer" id="timer">05:00</span>
        </div>

        <div class="product-info">
            <h2>Smartwatch Serie 9 Pro</h2>
            <p style="color: #666;">Edição Limitada - Tecnologia de Ponta no seu pulso.</p>
            
            <h3 style="color: #2d3748; font-size: 24px;">R$ 197,00</h3>
        </div>

        <div id="stock-container">
            <p>🔥 Restam apenas <span id="stock-count">8</span> unidades em estoque!</p>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>

        <a href="#" class="btn-buy">Garantir o meu agora!</a>
    </div>

    <script>
        // Script simples para o Timer (5 minutos)
        let time = 300; 
        const timerElement = document.getElementById('timer');

        setInterval(() => {
            let minutes = Math.floor(time / 60);
            let seconds = time % 60;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            timerElement.innerHTML = `${minutes}:${seconds}`;
            if(time > 0) time--;
        }, 1000);

        // Script para o Estoque diminuir "sozinho"
        function reduzirEstoque() {
            const count = document.getElementById('stock-count');
            let atual = parseInt(count.innerText);
            if (atual > 2) {
                count.innerText = atual - 1;
            }
        }
        // Diminui uma unidade a cada 45 segundos
        setInterval(reduzirEstoque, 45000);
    </script>

</body>
</html>
