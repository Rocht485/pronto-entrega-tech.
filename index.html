<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronto Entrega Tech | Oferta Relâmpago</title>
    <style>
        /* CSS - ESTILIZAÇÃO VISUAL */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            padding-bottom: 25px;
        }

        /* Banner de Urgência Superior */
        .promo-banner {
            background: #e53e3e;
            color: white;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .product-img {
            width: 100%;
            height: auto;
            margin-bottom: 15px;
        }

        .product-title {
            font-size: 1.4rem;
            color: #1a202c;
            margin: 10px 0;
        }

        .price {
            font-size: 2rem;
            color: #2d3748;
            font-weight: 800;
            margin: 10px 0;
        }

        /* TIMER */
        #timer-box {
            color: #e53e3e;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* SEU BLOCO DE ESTOQUE */
        #stock-container {
            padding: 0 20px;
            margin-bottom: 20px;
        }

        #stock-container p {
            color: #c53030;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .progress-bar {
            background-color: #edf2f7;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .progress-fill {
            background: linear-gradient(90deg, #f56565 0%, #e53e3e 100%);
            height: 100%;
            width: 25%; /* Começa em 25% para dar sensação de fim */
            transition: width 1.5s ease-in-out;
        }

        /* BOTÃO DE COMPRA */
        .btn-checkout {
            display: inline-block;
            background-color: #25d366;
            color: white;
            padding: 18px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }

        .btn-checkout:hover {
            transform: scale(1.05);
            background-color: #1eb954;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="promo-banner">🔥 Oferta por tempo limitado!</div>
    
    <img src="https://via.placeholder.com/400x300?text=Smartwatch+Serie+9" alt="Produto" class="product-img">

    <div class="product-title">Smartwatch Series 9 Pro</div>
    <div id="timer-box">A oferta expira em: <span id="timer">05:00</span></div>
    
    <div class="price">R$ 197,90</div>

    <div id="stock-container">
        <p>🔥 Restam apenas <span id="stock-count">8</span> unidades em estoque!</p>
        <div class="progress-bar">
            <div class="progress-fill" id="fill-bar"></div>
        </div>
    </div>

    <a href="SEU_LINK_DO_WHATSAPP_OU_CHECKOUT" class="btn-checkout">COMPRAR AGORA</a>
</div>

<script>
    // 1. Lógica do Timer (5 minutos)
    let timeInSeconds = 300;
    const timerDisplay = document.getElementById('timer');

    function startTimer() {
        const countdown = setInterval(() => {
            let minutes = Math.floor(timeInSeconds / 60);
            let seconds = timeInSeconds % 60;
            
            seconds = seconds < 10 ? '0' + seconds : seconds;
            minutes = minutes < 10 ? '0' + minutes : minutes;

            timerDisplay.innerHTML = `${minutes}:${seconds}`;

            if (timeInSeconds <= 0) {
                clearInterval(countdown);
                timerDisplay.innerHTML = "OFERTA ENCERRADA";
            } else {
                timeInSeconds--;
            }
        }, 1000);
    }

    // 2. Lógica de Diminuição do Estoque (Realista)
    function simulateStock() {
        const countElement = document.getElementById('stock-count');
        const fillBar = document.getElementById('fill-bar');
        
        let stock = 8;

        const interval = setInterval(() => {
            if (stock > 2) { // Nunca deixa chegar a zero para não perder a venda
                stock--;
                countElement.innerText = stock;
                
                // Ajusta a barra visualmente
                let newWidth = (stock / 8) * 25; // Baseado no 25% inicial
                fillBar.style.width = newWidth + "%";
            } else {
                clearInterval(interval);
            }
        }, 35000); // Diminui a cada 35 segundos
    }

    // Iniciar funções ao carregar a página
    window.onload = () => {
        startTimer();
        simulateStock();
    };
</script>

</body>
</html>
