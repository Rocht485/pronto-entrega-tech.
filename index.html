<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronto Entrega Tech | Loja Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .top-bar { background: #ff4500; text-align: center; padding: 10px; font-weight: bold; font-size: 12px; letter-spacing: 1px; }
        nav { padding: 25px; border-bottom: 1px solid #1a1a1a; text-align: center; background: #000; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: #ff4500; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .section-title { text-align: center; margin-bottom: 40px; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        .grid-products { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 16px; overflow: hidden; text-align: center; padding-bottom: 25px; transition: 0.3s; }
        .card:hover { border-color: #333; transform: translateY(-5px); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        .card h3 { margin: 20px 0 10px; font-size: 18px; }
        .price { color: #00ff41; font-size: 24px; font-weight: bold; margin-bottom: 15px; display: block; }
        .btn-details { background: #ff4500; color: #fff; text-decoration: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; display: inline-block; transition: 0.3s; cursor: pointer; }
        .btn-details:hover { background: #e63e00; scale: 1.05; }
        footer { text-align: center; padding: 40px; border-top: 1px solid #1a1a1a; margin-top: 40px; color: #444; }
    </style>
</head>
<body>
    <div class="top-bar">⚡ FRETE GRÁTIS PARA TODO O BRASIL ⚡</div>
    <nav><div class="logo">PRONTO<span>ENTREGA</span>TECH</div></nav>
    <main class="container">
        <h2 class="section-title">Nossos Destaques</h2>
        <div class="grid-products">
            <!-- PRODUTO 1 -->
            <div class="card">
                <img src="relogio.jpg">
                <h3>Smartwatch Ultra 10</h3>
                <span class="price">R$ 247,00</span>
                <a href="smartwatch-ultra.html#relogio" class="btn-details">VER DETALHES</a>
            </div>
            <!-- PRODUTO 2 -->
            <div class="card">
                <img src="https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=500">
                <h3>Fone Pro TWS Max</h3>
                <span class="price">R$ 147,00</span>
                <a href="smartwatch-ultra.html#fone" class="btn-details">VER DETALHES</a>
            </div>
            <!-- PRODUTO 3 -->
            <div class="card">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500">
                <h3>Headset Orion Pro RGB</h3>
                <span class="price">R$ 197,00</span>
                <a href="smartwatch-ultra.html#headset" class="btn-details">VER DETALHES</a>
            </div>
        </div>
    </main>
    <footer><p>&copy; 2026 PRONTO ENTREGA TECH</p></footer>
</body>
</html>
